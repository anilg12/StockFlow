<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="StockFlow - Stok Takip ve Musteri Iliskileri Yonetimi">
  <title>StockFlow</title>

  <defs>
    <linearGradient id="zemin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C1017"/>
      <stop offset="55%" stop-color="#111823"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>

    <linearGradient id="vurgu" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00806E"/>
      <stop offset="100%" stop-color="#2BE8CE"/>
    </linearGradient>

    <linearGradient id="parlama" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2BE8CE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2BE8CE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2BE8CE" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cizgi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BFA6" stop-opacity="0"/>
      <stop offset="18%" stop-color="#00BFA6" stop-opacity="1"/>
      <stop offset="72%" stop-color="#00BFA6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00BFA6" stop-opacity="0"/>
    </linearGradient>

    <pattern id="izgara" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0 L0 0 0 26" fill="none" stroke="#1B2534" stroke-width="1"/>
    </pattern>

    <filter id="isik" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="bulanik"/>
      <feMerge>
        <feMergeNode in="bulanik"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="kesim">
      <rect x="0" y="0" width="1200" height="320" rx="16"/>
    </clipPath>

    <style>
      .buyu    { transform-origin: 50% 100%; animation: buyu 2.6s cubic-bezier(.22,1,.36,1) infinite; }
      .b2      { animation-delay: .16s; }
      .b3      { animation-delay: .32s; }
      .b4      { animation-delay: .48s; }
      @keyframes buyu {
        0%       { transform: scaleY(.18); opacity: .45; }
        26%      { transform: scaleY(1);   opacity: 1; }
        68%      { transform: scaleY(1);   opacity: 1; }
        100%     { transform: scaleY(.18); opacity: .45; }
      }

      .tarayici { animation: tara 5.5s linear infinite; }
      @keyframes tara {
        0%   { transform: translateX(-360px); }
        100% { transform: translateX(1220px); }
      }

      .yaz  { opacity: 0; animation: belir .9s ease-out forwards; }
      .g1   { animation-delay: .15s; }
      .g2   { animation-delay: .45s; }
      .g3   { animation-delay: .75s; }
      .g4   { animation-delay: 1.05s; }
      @keyframes belir {
        from { opacity: 0; transform: translateY(9px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .nabiz { animation: nabiz 2.4s ease-in-out infinite; }
      @keyframes nabiz {
        0%, 100% { opacity: .35; }
        50%      { opacity: 1; }
      }

      .cizgim { stroke-dasharray: 900; stroke-dashoffset: 900; animation: ciz 2.2s ease-out .5s forwards; }
      @keyframes ciz { to { stroke-dashoffset: 0; } }

      @media (prefers-reduced-motion: reduce) {
        .buyu, .tarayici, .yaz, .nabiz, .cizgim { animation: none; }
        .yaz { opacity: 1; }
        .cizgim { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <g clip-path="url(#kesim)">
    <rect width="1200" height="320" fill="url(#zemin)"/>
    <rect width="1200" height="320" fill="url(#izgara)" opacity="0.5"/>

    <!-- ustten gecen isik huzmesi -->
    <g class="tarayici">
      <rect x="0" y="0" width="200" height="320" fill="url(#parlama)" opacity="0.10"/>
    </g>

    <!-- sol taraf: buyuyen sutunlar -->
    <g transform="translate(78 96)">
      <rect class="buyu"    x="0"  y="0"  width="22" height="128" rx="4" fill="url(#vurgu)" opacity="0.55"/>
      <rect class="buyu b2" x="32" y="0"  width="22" height="128" rx="4" fill="url(#vurgu)" opacity="0.75"/>
      <rect class="buyu b3" x="64" y="0"  width="22" height="128" rx="4" fill="url(#vurgu)"/>
      <rect class="buyu b4" x="96" y="0"  width="22" height="128" rx="4" fill="#2BE8CE" filter="url(#isik)"/>
      <rect x="-6" y="134" width="130" height="2" rx="1" fill="#00BFA6" opacity="0.65"/>
    </g>

    <!-- baslik -->
    <g transform="translate(246 0)">
      <text class="yaz g1" x="0" y="128"
            font-family="Bahnschrift, 'Segoe UI Semibold', 'Segoe UI', Candara, Calibri, Helvetica, Arial, sans-serif"
            font-size="76" font-weight="700" fill="#EAF2F5" letter-spacing="-1.2">StockFlow</text>

      <path class="cizgim" d="M2 150 L560 150" stroke="url(#cizgi)" stroke-width="3" fill="none" stroke-linecap="round"/>

      <text class="yaz g2" x="2" y="184"
            font-family="'Segoe UI', Candara, Calibri, Helvetica, Arial, sans-serif"
            font-size="21" fill="#8FA3B0">Stok takip ve müşteri ilişkileri yönetimi</text>

      <g class="yaz g3" transform="translate(2 208)">
        <g>
          <rect x="0" y="0" width="104" height="27" rx="13" fill="#141C28" stroke="#243040" stroke-width="1"/>
          <text x="52" y="18" text-anchor="middle" font-family="Consolas, 'Cascadia Mono', monospace"
                font-size="12" fill="#00BFA6">Python 3.8+</text>
        </g>
        <g transform="translate(114 0)">
          <rect x="0" y="0" width="84" height="27" rx="13" fill="#141C28" stroke="#243040" stroke-width="1"/>
          <text x="42" y="18" text-anchor="middle" font-family="Consolas, 'Cascadia Mono', monospace"
                font-size="12" fill="#00BFA6">tkinter</text>
        </g>
        <g transform="translate(208 0)">
          <rect x="0" y="0" width="76" height="27" rx="13" fill="#141C28" stroke="#243040" stroke-width="1"/>
          <text x="38" y="18" text-anchor="middle" font-family="Consolas, 'Cascadia Mono', monospace"
                font-size="12" fill="#00BFA6">SQLite</text>
        </g>
        <g transform="translate(294 0)">
          <rect x="0" y="0" width="150" height="27" rx="13" fill="#141C28" stroke="#243040" stroke-width="1"/>
          <text x="75" y="18" text-anchor="middle" font-family="Consolas, 'Cascadia Mono', monospace"
                font-size="12" fill="#7A8B99">sıfır bağımlılık</text>
        </g>
      </g>
    </g>

    <!-- sag taraf: mini panel kartlari -->
    <g transform="translate(830 74)" opacity="0.95">
      <rect x="0" y="0" width="152" height="72" rx="10" fill="#141A24" stroke="#243040" stroke-width="1"/>
      <rect x="0" y="0" width="152" height="3" rx="1.5" fill="#00BFA6"/>
      <text x="14" y="30" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#7A8B99" letter-spacing="1">AKTİF ÜRÜN</text>
      <text x="14" y="58" font-family="Consolas, monospace" font-size="26" font-weight="700" fill="#EAF2F5">27</text>

      <g transform="translate(166 0)">
        <rect x="0" y="0" width="152" height="72" rx="10" fill="#141A24" stroke="#243040" stroke-width="1"/>
        <rect x="0" y="0" width="152" height="3" rx="1.5" fill="#F0553A"/>
        <text x="14" y="30" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#7A8B99" letter-spacing="1">KRİTİK STOK</text>
        <text x="14" y="58" font-family="Consolas, monospace" font-size="26" font-weight="700" fill="#EAF2F5">2</text>
        <circle class="nabiz" cx="136" cy="26" r="4" fill="#F0553A"/>
      </g>

      <g transform="translate(0 84)">
        <rect x="0" y="0" width="318" height="72" rx="10" fill="#141A24" stroke="#243040" stroke-width="1"/>
        <rect x="0" y="0" width="318" height="3" rx="1.5" fill="#2BE8CE"/>
        <text x="14" y="30" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#7A8B99" letter-spacing="1">BU AY CİRO</text>
        <text x="14" y="58" font-family="Consolas, monospace" font-size="26" font-weight="700" fill="#2BE8CE">396.667,20 ₺</text>
        <g transform="translate(232 34)">
          <rect class="buyu"    x="0"  y="-18" width="9" height="18" rx="2" fill="#00BFA6" opacity="0.5"/>
          <rect class="buyu b2" x="14" y="-24" width="9" height="24" rx="2" fill="#00BFA6" opacity="0.7"/>
          <rect class="buyu b3" x="28" y="-14" width="9" height="14" rx="2" fill="#00BFA6" opacity="0.85"/>
          <rect class="buyu b4" x="42" y="-28" width="9" height="28" rx="2" fill="#2BE8CE"/>
        </g>
      </g>
    </g>

    <!-- alt serit -->
    <rect x="0" y="278" width="1200" height="42" fill="#0A0E14" opacity="0.9"/>
    <rect x="0" y="278" width="1200" height="1" fill="#1E2836"/>
    <text class="yaz g4" x="78" y="304"
          font-family="Consolas, 'Cascadia Mono', monospace" font-size="13" fill="#5E7180">
      Kapadokya Üniversitesi · Bitirme Projesi
    </text>
    <text class="yaz g4" x="1122" y="304" text-anchor="end"
          font-family="Consolas, 'Cascadia Mono', monospace" font-size="13" fill="#5E7180">
      Anıl Gül · 2025
    </text>

    <rect x="0.5" y="0.5" width="1199" height="319" rx="16" fill="none" stroke="#243040" stroke-width="1"/>
  </g>
</svg>
